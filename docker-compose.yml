services:
  postgres:
    image: postgres:16-alpine
    container_name: sampler_postgres
    environment:
      POSTGRES_DB: sampler_iot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sampler_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: sampler_server
    environment:
      - PORT=8080
      - DB_URL=postgresql://postgres:postgres@postgres:5432/sampler_iot
      - REDIS_URL=tcp://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: sampler_client
    stdin_open: true
    tty: true
    depends_on:
      - server
    environment:
      - DEVICE_NAME=device-1
      - SERVER_URL=http://server:8080
      - ENABLE_TEMP=1
      - ENABLE_WEIGHT=1

  client2:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: sampler_client2
    stdin_open: true
    tty: true
    depends_on:
      - server
    environment:
      - DEVICE_NAME=device-2
      - SERVER_URL=http://server:8080
      - ENABLE_WEIGHT=1

  client3:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: sampler_client3
    stdin_open: true
    tty: true
    depends_on:
      - server
    environment:
      - DEVICE_NAME=device-3
      - SERVER_URL=http://server:8080
      - ENABLE_TEMP=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sampler_frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_SERVER_HOST=server

volumes:
  postgres_data:
  redis_data:
